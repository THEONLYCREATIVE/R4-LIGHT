<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>PharmaScan Pro v5.0 | Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── LIGHT THEME VARIABLES ─── */
:root {
  --b0: #f8fafc; /* Page Background */
  --b1: #ffffff; /* Card Background */
  --b2: #f1f5f9; /* Subtle Inputs/Buttons */
  --b3: #e2e8f0; /* Borders */
  --b4: #cbd5e1; /* Hover Borders */
  --accent: #00bfa5; /* Medical Teal */
  --accent-dim: #00897b;
  --accent-glow: rgba(0, 191, 165, 0.1);
  --text: #0f172a; /* Primary Text */
  --text-dim: #64748b; /* Secondary Text */
  --text-muted: #94a3b8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #0ea5e9;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
  --font-mono: 'IBM Plex Mono', monospace;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Mulish', sans-serif;
}

/* ─── RESET & BASE ─── */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: var(--font-body); 
  background: var(--b0); 
  color: var(--text); 
  height: 100dvh; 
  overflow: hidden; 
  line-height: 1.5;
}

/* ─── LAYOUT ─── */
.app { display: flex; flex-direction: column; height: 100dvh; }

/* ─── TOP BAR ─── */
.topbar {
  flex-shrink: 0;
  padding: calc(env(safe-area-inset-top, 0px) + 15px) 20px 15px;
  background: var(--b1);
  border-bottom: 1px solid var(--b3);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.logo-pill {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
  color: white;
  padding: 4px 10px; border-radius: var(--radius-sm);
  font-family: var(--font-display); font-weight: 700; font-size: 14px;
}
.logo-text { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-left: 8px; color: var(--text); }
.logo-ver { font-family: var(--font-mono); font-size: 10px; color: var(--accent-dim); background: var(--b2); padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: 600; }

/* ─── PAGES ─── */
.pages { flex: 1; position: relative; overflow: hidden; }
.page { 
  position: absolute; inset: 0; overflow-y: auto; 
  padding: 16px 16px calc(100px + env(safe-area-inset-bottom, 0px)); 
  display: none; 
}
.page.active { display: block; animation: fadeIn 0.3s ease; }

/* ─── CARDS & UI ─── */
.scan-card, .stat-card, .hist-card, .dash-card {
  background: var(--b1);
  border: 1px solid var(--b3);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}

/* Inputs */
.barcode-row { display: flex; gap: 8px; margin-bottom: 12px; }
input.glass-input {
  flex: 1; height: 50px; background: var(--b1); 
  border: 2px solid var(--b3); border-radius: var(--radius);
  color: var(--text); padding: 0 16px; font-family: var(--font-mono);
}
input.glass-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px var(--accent-glow); background: #fff; }

/* Buttons */
.btn {
  height: 48px; border-radius: var(--radius); border: none;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%); color: white; }
.btn-glass { background: var(--b2); border: 1px solid var(--b3); color: var(--text-dim); }
.btn:active { transform: scale(0.96); }

/* Stats */
.stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { text-align: center; padding: 12px 8px; border: 1px solid var(--b3); }
.stat-val { font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: var(--accent-dim); }
.stat-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

/* History Items */
.hist-card { display: flex; padding: 0; overflow: hidden; align-items: stretch; }
.card-accent { width: 6px; flex-shrink: 0; }
.card-accent.good { background: var(--success); }
.card-accent.warn { background: var(--warning); }
.card-accent.expired { background: var(--danger); }
.card-body { padding: 12px 16px; flex: 1; }
.card-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--text); }
.card-meta span { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-right: 12px; }
.qty-badge { background: var(--b2); color: var(--accent-dim); padding: 2px 8px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono); font-weight: 600; }

/* Section Headers */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.sec-action { font-size: 12px; font-weight: 700; color: var(--accent-dim); cursor: pointer; }

/* Chips */
.chips-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
.chip { 
  white-space: nowrap; padding: 6px 14px; border-radius: 20px; 
  background: var(--b1); border: 1px solid var(--b3); color: var(--text-dim); 
  font-size: 12px; font-weight: 600; 
}
.chip.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ─── DOCK ─── */
.dock-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 15px);
  background: linear-gradient(0deg, var(--b0) 60%, transparent 100%);
  display: flex; justify-content: center; z-index: 100;
}
.dock {
  background: var(--b1); border: 1px solid var(--b3);
  padding: 8px; border-radius: 28px; display: flex; gap: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.dock-btn {
  width: 50px; height: 50px; border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  font-size: 20px;
}
.dock-btn.active { background: var(--b2); color: var(--accent-dim); }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar-logo">
      <span class="logo-pill">PS</span>
      <span class="logo-text">PharmaScan<span class="logo-ver">v5.0</span></span>
    </div>
    <div class="topbar-right" style="display: flex; align-items: center; gap: 12px;">
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--accent-dim); background: var(--accent-glow); padding: 4px 8px; border-radius: 6px;">STR-802</span>
      <div style="font-size: 20px; cursor: pointer;">⚙️</div>
    </div>
  </header>

  <main class="pages">
    <section id="scan-page" class="page active">
      <div class="scan-card">
        <div class="sec-hdr">
          <span class="sec-title">Quick Scanner</span>
        </div>
        <div class="barcode-row">
          <input type="text" class="glass-input" placeholder="Scan or enter code..." autofocus>
          <button class="btn btn-glass" style="width: 50px; padding: 0;">📷</button>
        </div>
        <div class="scan-btns">
          <button class="btn btn-glass" style="flex: 1;">Manual Entry</button>
          <button class="btn btn-primary" style="flex: 1;">Process Item</button>
        </div>
      </div>

      <div class="stats-strip">
        <div class="stat-card">
          <div class="stat-val">128</div>
          <div class="stat-lbl">Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color: var(--warning);">14</div>
          <div class="stat-lbl">Expiring</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color: var(--info);">52</div>
          <div class="stat-lbl">Pending</div>
        </div>
      </div>

      <div class="sec-hdr">
        <span class="sec-title">Recent Activity</span>
        <span class="sec-action">View All</span>
      </div>

      <div class="chips-row">
        <div class="chip active">All Items</div>
        <div class="chip">Medicines</div>
        <div class="chip">Skincare</div>
        <div class="chip">Supplements</div>
      </div>

      <div class="hist-card">
        <div class="card-accent good"></div>
        <div class="card-body">
          <div class="card-name">PANADOL ADVANCE 500MG</div>
          <div class="card-meta">
            <span>EXP: <b>12/2027</b></span>
            <span>BATCH: <b>LX992</b></span>
          </div>
          <div class="card-footer" style="display: flex; justify-content: space-between; margin-top: 8px;">
            <span class="qty-badge">QTY: 12</span>
            <span class="sec-action">Edit Item</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="dock-wrap">
    <div class="dock">
      <div class="dock-btn active">📊</div>
      <div class="dock-btn">🔍</div>
      <div class="dock-btn">📦</div>
      <div class="dock-btn">📄</div>
    </div>
  </nav>
</div>

</body>
</html>
